name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-gateway:
    name: Gateway (Go) — Build + Test + Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...
        working-directory: backend/realtime-gateway

      - name: Vet
        run: go vet ./...
        working-directory: backend/realtime-gateway

      - name: Test with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: backend/realtime-gateway

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
        working-directory: backend/realtime-gateway

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-coverage
          path: backend/realtime-gateway/coverage.out

  go-orchestrator:
    name: Orchestrator (Go) — Build + Test + Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...
        working-directory: backend/adk-orchestrator

      - name: Vet
        run: go vet ./...
        working-directory: backend/adk-orchestrator

      - name: Test with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: backend/adk-orchestrator

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
        working-directory: backend/adk-orchestrator

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-coverage
          path: backend/adk-orchestrator/coverage.out

  swift:
    name: Client (Swift 6 / macOS) — Build + Test
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true

      - name: Select Xcode 16+ and accept license
        run: |
          xcodes=($(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V))
          if [ ${#xcodes[@]} -eq 0 ]; then
            xcodes=(/Applications/Xcode.app)
          fi

          selected=""
          for (( idx=${#xcodes[@]}-1; idx>=0; idx-- )); do
            candidate="${xcodes[$idx]}"
            devdir="$candidate/Contents/Developer"
            if [ ! -d "$devdir" ]; then
              continue
            fi
            if DEVELOPER_DIR="$devdir" xcodebuild -checkFirstLaunchStatus >/dev/null 2>&1; then
              selected="$devdir"
              break
            fi
          done

          if [ -z "$selected" ]; then
            latest="${xcodes[$((${#xcodes[@]}-1))]}"
            selected="$latest/Contents/Developer"
            if sudo -n true 2>/dev/null; then
              sudo -n env DEVELOPER_DIR="$selected" xcodebuild -runFirstLaunch >/dev/null 2>&1 || true
              sudo -n env DEVELOPER_DIR="$selected" xcodebuild -license accept >/dev/null 2>&1 || true
            fi
            if ! DEVELOPER_DIR="$selected" xcodebuild -checkFirstLaunchStatus >/dev/null 2>&1; then
              echo "::error::No licensed Xcode installation is available on this runner."
              echo "::error::Checked candidates: ${xcodes[*]}"
              xcode-select -p || true
              exit 69
            fi
          fi

          export DEVELOPER_DIR="$selected"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          xcodebuild -checkFirstLaunchStatus
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build
        working-directory: VibeCat

      - name: Test
        run: swift test
        working-directory: VibeCat

  docker:
    name: Docker — Build images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Build Gateway image
        run: docker build -t vibecat-gateway backend/realtime-gateway/

      - name: Build Orchestrator image
        run: docker build -t vibecat-orchestrator backend/adk-orchestrator/
