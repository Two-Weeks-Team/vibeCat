name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-gateway:
    name: Gateway (Go) — Build + Test + Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...
        working-directory: backend/realtime-gateway

      - name: Vet
        run: go vet ./...
        working-directory: backend/realtime-gateway

      - name: Test with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: backend/realtime-gateway

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
        working-directory: backend/realtime-gateway

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-coverage
          path: backend/realtime-gateway/coverage.out

  go-orchestrator:
    name: Orchestrator (Go) — Build + Test + Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...
        working-directory: backend/adk-orchestrator

      - name: Vet
        run: go vet ./...
        working-directory: backend/adk-orchestrator

      - name: Test with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: backend/adk-orchestrator

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
        working-directory: backend/adk-orchestrator

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-coverage
          path: backend/adk-orchestrator/coverage.out

  swift:
    name: Client (Swift 6 / macOS) — Build + Test
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true

      - name: Select Xcode 16+
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then XCODE_PATH="/Applications/Xcode.app"; fi
          echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"
          swift --version

      - name: Build
        run: swift build
        working-directory: VibeCat

      - name: Test
        run: swift test
        working-directory: VibeCat

  docker:
    name: Docker — Build images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Build Gateway image
        run: docker build -t vibecat-gateway backend/realtime-gateway/

      - name: Build Orchestrator image
        run: docker build -t vibecat-orchestrator backend/adk-orchestrator/
