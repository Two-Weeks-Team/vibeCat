displayName: VibeCat Operations Overview
gridLayout:
  columns: 2
  widgets:
  - title: Gateway Requests / s
    scorecard:
      timeSeriesQuery:
        timeSeriesFilter:
          filter: metric.type="run.googleapis.com/request_count" resource.type="cloud_run_revision" resource.label.service_name="realtime-gateway"
          aggregation:
            alignmentPeriod: 60s
            perSeriesAligner: ALIGN_RATE
            crossSeriesReducer: REDUCE_SUM
      sparkChartView:
        sparkChartType: SPARK_LINE
  - title: Gateway P95 Latency
    scorecard:
      timeSeriesQuery:
        timeSeriesFilter:
          filter: metric.type="run.googleapis.com/request_latencies" resource.type="cloud_run_revision" resource.label.service_name="realtime-gateway"
          aggregation:
            alignmentPeriod: 60s
            perSeriesAligner: ALIGN_PERCENTILE_95
            crossSeriesReducer: REDUCE_MAX
      sparkChartView:
        sparkChartType: SPARK_LINE
  - title: Orchestrator Requests / s
    scorecard:
      timeSeriesQuery:
        timeSeriesFilter:
          filter: metric.type="run.googleapis.com/request_count" resource.type="cloud_run_revision" resource.label.service_name="adk-orchestrator"
          aggregation:
            alignmentPeriod: 60s
            perSeriesAligner: ALIGN_RATE
            crossSeriesReducer: REDUCE_SUM
      sparkChartView:
        sparkChartType: SPARK_LINE
  - title: Orchestrator P95 Latency
    scorecard:
      timeSeriesQuery:
        timeSeriesFilter:
          filter: metric.type="run.googleapis.com/request_latencies" resource.type="cloud_run_revision" resource.label.service_name="adk-orchestrator"
          aggregation:
            alignmentPeriod: 60s
            perSeriesAligner: ALIGN_PERCENTILE_95
            crossSeriesReducer: REDUCE_MAX
      sparkChartView:
        sparkChartType: SPARK_LINE
  - title: Gateway CPU Utilization
    scorecard:
      timeSeriesQuery:
        timeSeriesFilter:
          filter: metric.type="run.googleapis.com/container/cpu/utilizations" resource.type="cloud_run_revision" resource.label.service_name="realtime-gateway"
          aggregation:
            alignmentPeriod: 60s
            perSeriesAligner: ALIGN_MEAN
            crossSeriesReducer: REDUCE_MEAN
      sparkChartView:
        sparkChartType: SPARK_LINE
  - title: Gateway Memory Utilization
    scorecard:
      timeSeriesQuery:
        timeSeriesFilter:
          filter: metric.type="run.googleapis.com/container/memory/utilizations" resource.type="cloud_run_revision" resource.label.service_name="realtime-gateway"
          aggregation:
            alignmentPeriod: 60s
            perSeriesAligner: ALIGN_MEAN
            crossSeriesReducer: REDUCE_MEAN
      sparkChartView:
        sparkChartType: SPARK_LINE
  - title: Orchestrator CPU Utilization
    scorecard:
      timeSeriesQuery:
        timeSeriesFilter:
          filter: metric.type="run.googleapis.com/container/cpu/utilizations" resource.type="cloud_run_revision" resource.label.service_name="adk-orchestrator"
          aggregation:
            alignmentPeriod: 60s
            perSeriesAligner: ALIGN_MEAN
            crossSeriesReducer: REDUCE_MEAN
      sparkChartView:
        sparkChartType: SPARK_LINE
  - title: Orchestrator Memory Utilization
    scorecard:
      timeSeriesQuery:
        timeSeriesFilter:
          filter: metric.type="run.googleapis.com/container/memory/utilizations" resource.type="cloud_run_revision" resource.label.service_name="adk-orchestrator"
          aggregation:
            alignmentPeriod: 60s
            perSeriesAligner: ALIGN_MEAN
            crossSeriesReducer: REDUCE_MEAN
      sparkChartView:
