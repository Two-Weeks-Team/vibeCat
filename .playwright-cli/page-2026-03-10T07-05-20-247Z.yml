              - img "열기" [ref=e99]
            - paragraph [ref=e101]:
              - text: 조달청, 중소벤처기업부에서부터 공공기관, 지방자치단체에 이르기까지 구매계약 시 신용평가등급을 적격심사기준에 포함시키는
              - text: 기관들이 계속해서 늘어나고 있습니다. 조달청, 중소기업청, 지방자치단체들을 시작으로 한국토지공사, 한국주택공사,
              - text: 한국도로공사, 한국전력공사, 한국철도공사, 한국수자원공사, 한국농촌공사, 한국조폐공사, 지하철공사, 한국마사회,
              - text: 방위사업청, 한국공항공사, 공무원연금관리공단, 한국가스공사 등이 신용평가등급을 적용 중이며 계속 확대추세에 있습니다.
